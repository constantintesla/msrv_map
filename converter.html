<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конвертер файлов</title>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header__title">Конвертер файлов</h1>
      <nav class="header__nav">
        <a href="/" class="header__link">← На карту</a>
      </nav>
    </header>

    <div class="converter">
      <div class="converter__card">
        <div class="section">
          <div class="section__title">Исходный файл</div>
          <label class="btn btn--primary" style="cursor:pointer;">
            Выбрать файл
            <input type="file" id="input-file" accept=".kml,.kmz,.gpx" style="display:none;">
          </label>
          <span id="file-name" style="margin-left:0.5rem;font-size:0.85rem;color:var(--color-text-secondary);"></span>
        </div>

        <div class="section">
          <div class="section__title">Имя выходных файлов</div>
          <input type="text" class="input" id="input-output-name" placeholder="map_converted">
        </div>

        <button class="btn btn--success btn--full" id="btn-convert" disabled>Конвертировать</button>

        <div id="results" style="display:none;">
          <div class="section">
            <div class="section__title">Результат</div>
            <div id="results-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/converter-main.ts"></script>
</body>
</html>
